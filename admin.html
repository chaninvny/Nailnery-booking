<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF6EC;
    --cream-dark: #F2EBD8;
    --ink: #0E0E0E;
    --ink-soft: #2A2A2A;
    --muted: #8A8377;
    --line: #E5DDC8;
    --accent: #E85D43;
    --green: #2D7A4A;
    --green-soft: #E8F2EC;
    --red: #C44530;
    --red-soft: #FBEAE6;
    --blue-soft: #E4EEF7;
    --blue: #2C5F8E;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body { padding-bottom: 80px; }

  /* ── LOGIN ── */
  #login-view {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--cream-dark);
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .login-box .badge {
    display: inline-block;
    background: var(--ink);
    color: var(--cream);
    font-size: 10px;
    letter-spacing: 0.25em;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .login-box h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1.05;
    margin-bottom: 4px;
  }
  .login-box h1 em { font-style: italic; color: var(--accent); }
  .login-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .login-box label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .login-box input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    font-family: inherit;
    font-size: 16px;
    background: var(--cream);
    margin-bottom: 16px;
  }
  .login-box input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .login-box button {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.15em;
    cursor: pointer;
  }
  .login-error {
    color: var(--red);
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--ink);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .brand {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  header .brand span { color: var(--accent); }
  header .logout-btn {
    background: transparent;
    border: 1px solid var(--cream);
    color: var(--cream);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  /* ── STATS ── */
  .stats {
    padding: 16px 18px 8px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--cream-dark);
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-card .num {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
    color: var(--ink);
  }
  .stat-card .lbl {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
  }
  .stat-card.today { background: var(--ink); color: var(--cream); }
  .stat-card.today .num { color: var(--accent); }
  .stat-card.today .lbl { color: var(--cream); opacity: 0.7; }

  /* ── SEARCH ── */
  .search-bar {
    padding: 12px 18px 0;
  }
  .search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-input-wrap::before {
    content: '🔍';
    position: absolute;
    left: 14px;
    font-size: 14px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 12px 40px 12px 40px;
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    background: var(--cream);
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  .search-input:focus { background: white; }
  .search-clear {
    position: absolute;
    right: 12px;
    background: var(--muted);
    color: white;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 12px;
    cursor: pointer;
    display: none;
  }
  .search-clear.show { display: flex; align-items: center; justify-content: center; }

  /* ── FILTERS ── */
  .filters {
    padding: 12px 18px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    background: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-chip.active {
    background: var(--ink);
    color: var(--cream);
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 18px 10px;
  }
  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    line-height: 1;
  }
  .section-header .count {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── BOOKING CARDS ── */
  .booking-list {
    padding: 0 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .booking-card {
    background: var(--cream-dark);
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .booking-card.confirmed { background: var(--green-soft); }
  .booking-card.completed { background: var(--blue-soft); }
  .booking-card.completed .booking-name { color: var(--blue); }
  .booking-card.cancelled { background: var(--cream-dark); opacity: 0.55; }
  .booking-card.cancelled .booking-name { text-decoration: line-through; }

  .status-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border-radius: 100px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .status-tag.confirmed { background: var(--green); color: white; }
  .status-tag.completed { background: var(--blue); color: white; }
  .status-tag.cancelled { background: var(--muted); color: white; }

  .booking-ref {
    display: inline-block;
    font-family: 'Archivo Black', sans-serif;
    font-size: 10px;
    background: var(--ink);
    color: var(--cream);
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 4px;
    margin-bottom: 8px;
  }

  .booking-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .booking-time {
    text-align: center;
    background: var(--ink);
    color: var(--cream);
    padding: 8px 12px;
    border-radius: 6px;
    min-width: 70px;
    flex-shrink: 0;
  }
  .booking-time .hr {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    line-height: 1;
  }
  .booking-time .lbl {
    font-size: 9px;
    letter-spacing: 0.1em;
    opacity: 0.7;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .booking-info { flex: 1; min-width: 0; }
  .booking-name {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    line-height: 1.2;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .booking-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .booking-meta .row { display: flex; align-items: center; gap: 6px; }
  .booking-meta .label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-width: 38px;
  }
  .booking-meta .value { word-break: break-word; }
  .booking-meta a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }

  /* ── ACTION BUTTONS ── */
  .booking-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding-top: 12px;
    border-top: 1px dashed var(--ink);
  }
  .btn-action {
    padding: 9px 8px;
    border-radius: 5px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--ink);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--ink);
  }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-line { background: #06C755; color: white; border-color: #06C755; }
  .btn-call { background: var(--cream); color: var(--ink); }
  .btn-edit { background: var(--cream); color: var(--ink); }
  .btn-complete { background: var(--blue); color: white; border-color: var(--blue); }
  .btn-cancel { background: var(--red-soft); color: var(--red); border-color: var(--red); }
  .btn-delete { background: var(--red); color: white; border-color: var(--red); }
  .btn-undo { background: var(--ink); color: var(--cream); }
  .btn-full { grid-column: 1 / -1; }

  /* ── EMPTY/LOADING ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .msg {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
  }
  .empty-state .sub { font-size: 12px; margin-top: 4px; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── FAB ── */
  .fab-group {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 5;
  }
  .fab {
    width: 52px;
    height: 52px;
    background: var(--ink);
    color: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    box-shadow: 3px 3px 0 var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .fab.refresh.loading { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fab.add { background: var(--accent); border-color: var(--ink); box-shadow: 3px 3px 0 var(--ink); font-size: 28px; line-height: 1; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(14,14,14,0.6);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding: 0;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 22px 20px 28px;
    border-top: 1.5px solid var(--ink);
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--muted);
    border-radius: 100px;
    margin: 0 auto 14px;
    opacity: 0.5;
  }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    margin-bottom: 6px;
  }
  .modal h2 em { font-style: italic; color: var(--accent); }
  .modal .modal-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .modal .field {
    margin-bottom: 14px;
  }
  .modal .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .modal .field input,
  .modal .field select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    font-family: inherit;
    font-size: 15px;
    background: white;
  }
  .modal .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 10px;
    margin-top: 22px;
  }
  .btn-modal {
    padding: 14px;
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-modal.cancel { background: var(--cream-dark); color: var(--ink); }
  .btn-modal.save { background: var(--ink); color: var(--cream); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: var(--red); }
  .toast.success { background: var(--green); }

  /* ── VIEW TOGGLE ── */
  .view-toggle {
    display: flex;
    gap: 0;
    padding: 12px 18px 0;
    align-items: center;
    justify-content: space-between;
  }
  .view-tabs {
    display: flex;
    background: var(--cream-dark);
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }
  .view-tab {
    padding: 7px 14px;
    border: none;
    background: transparent;
    border-radius: 100px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink);
  }
  .view-tab.active {
    background: var(--ink);
    color: var(--cream);
  }
  .export-btn {
    background: var(--cream);
    border: 1.5px solid var(--ink);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── TABLE VIEW ── */
  .table-wrap {
    padding: 16px 18px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .booking-table {
    width: 100%;
    min-width: 760px;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    overflow: hidden;
    font-size: 13px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .booking-table thead {
    background: var(--ink);
    color: var(--cream);
  }
  .booking-table th {
    padding: 12px 10px;
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .booking-table th:hover { color: var(--accent); }
  .booking-table th .sort-icon {
    margin-left: 4px;
    opacity: 0.5;
    font-size: 9px;
  }
  .booking-table th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  .booking-table tbody tr {
    border-top: 1px solid var(--line);
    background: var(--cream);
    transition: background 0.15s;
  }
  .booking-table tbody tr:hover { background: var(--cream-dark); }
  .booking-table tbody tr.row-completed { background: var(--blue-soft); }
  .booking-table tbody tr.row-cancelled { background: #FAEEDA; opacity: 0.7; }
  .booking-table td {
    padding: 12px 10px;
    vertical-align: middle;
    color: var(--ink);
  }
  .booking-table td.col-time {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
  }
  .booking-table td.col-name {
    font-weight: 500;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .booking-table td.col-ref {
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    color: var(--muted);
  }
  .booking-table .mini-tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 100px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    display: inline-block;
  }
  .mini-tag.confirmed { background: var(--green); color: white; }
  .mini-tag.completed { background: var(--blue); color: white; }
  .mini-tag.cancelled { background: var(--muted); color: white; }
  .booking-table td.col-actions {
    white-space: nowrap;
  }
  .table-action {
    background: none;
    border: 1px solid var(--ink);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 11px;
    cursor: pointer;
    margin-right: 4px;
    font-family: inherit;
  }
  .table-action:hover { background: var(--cream-dark); }
  .table-action.del { color: var(--red); border-color: var(--red); }
  .table-action.del:hover { background: var(--red); color: white; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ─────────── LOGIN ─────────── -->
<div id="login-view">
  <div class="login-box">
    <span class="badge">ADMIN ONLY</span>
    <h1>Welcome<br><em>back.</em></h1>
    <p>กรุณาใส่รหัสผ่านเพื่อเข้าระบบ</p>
    <label for="pwd">รหัสผ่าน</label>
    <input id="pwd" type="password" placeholder="••••••••" autocomplete="off">
    <button id="login-btn">เข้าสู่ระบบ →</button>
    <div class="login-error" id="login-error">รหัสผ่านไม่ถูกต้อง</div>
  </div>
</div>

<!-- ─────────── DASHBOARD ─────────── -->
<div id="dashboard-view" class="hidden">

  <header>
    <div class="brand">NAIL NERY <span>·</span> ADMIN</div>
    <button class="logout-btn" id="logout-btn">ออก</button>
  </header>

  <div class="stats">
    <div class="stat-card today">
      <div class="num" id="stat-today">0</div>
      <div class="lbl">วันนี้</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-week">0</div>
      <div class="lbl">สัปดาห์นี้</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-completed">0</div>
      <div class="lbl">เสร็จแล้ว</div>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="ค้นชื่อ เบอร์ หรือ Line ID...">
      <button class="search-clear" id="search-clear">✕</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-chip active" data-filter="upcoming">นัดล่วงหน้า</button>
    <button class="filter-chip" data-filter="today">วันนี้</button>
    <button class="filter-chip" data-filter="completed">เสร็จแล้ว</button>
    <button class="filter-chip" data-filter="cancelled">ยกเลิก</button>
    <button class="filter-chip" data-filter="all">ทั้งหมด</button>
  </div>

  <div class="view-toggle">
    <div class="view-tabs">
      <button class="view-tab active" data-view="cards">🗂 การ์ด</button>
      <button class="view-tab" data-view="table">📊 ตาราง</button>
    </div>
    <button class="export-btn" id="export-btn" title="ดาวน์โหลด CSV">⬇ CSV</button>
  </div>

  <div id="booking-container">
    <div class="loading">กำลังโหลดข้อมูล...</div>
  </div>

</div>

<!-- FABs -->
<div class="fab-group hidden" id="fab-group">
  <button class="fab add" id="add-btn" title="เพิ่มนัด">+</button>
  <button class="fab refresh" id="refresh-btn" title="รีเฟรช">↻</button>
</div>

<!-- ── MODAL: Edit / Add ── -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">แก้ไข<em>นัด</em></h2>
    <p class="modal-sub" id="modal-sub">เปลี่ยนข้อมูลการจองได้ตามต้องการ</p>

    <div class="field">
      <label>ชื่อลูกค้า</label>
      <input type="text" id="edit-name" placeholder="ชื่อ-นามสกุล">
    </div>
    <div class="field">
      <label>เบอร์โทร</label>
      <input type="tel" id="edit-phone" placeholder="0812345678">
    </div>
    <div class="field">
      <label>Line ID</label>
      <input type="text" id="edit-line" placeholder="@nailnery หรือ id">
    </div>
    <div class="field-row">
      <div class="field">
        <label>วันที่</label>
        <input type="date" id="edit-date">
      </div>
      <div class="field">
        <label>เวลา</label>
        <select id="edit-time">
          <option value="13:00">13:00</option>
          <option value="15:00">15:00</option>
          <option value="17:00">17:00</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-modal cancel" id="modal-cancel">ยกเลิก</button>
      <button class="btn-modal save" id="modal-save">บันทึก</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let allBookings = [];
  let currentFilter = 'upcoming';
  let searchTerm = '';
  let editingId = null; // null = adding new, id = editing

  // ───── LOGIN ─────
  const SESSION_KEY = 'nn_admin_session';
  const isLoggedIn = () => sessionStorage.getItem(SESSION_KEY) === 'true';

  function showDashboard() {
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('dashboard-view').classList.remove('hidden');
    document.getElementById('fab-group').classList.remove('hidden');
    loadBookings();
  }
  function showLogin() {
    document.getElementById('login-view').classList.remove('hidden');
    document.getElementById('dashboard-view').classList.add('hidden');
    document.getElementById('fab-group').classList.add('hidden');
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    const pwd = document.getElementById('pwd').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, 'true');
      showDashboard();
    } else {
      const err = document.getElementById('login-error');
      err.classList.add('show');
      setTimeout(() => err.classList.remove('show'), 2500);
    }
  });
  document.getElementById('pwd').addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('pwd').value = '';
    showLogin();
  });

  // ───── TOAST ─────
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ───── LOAD ─────
  async function loadBookings() {
    const refresh = document.getElementById('refresh-btn');
    refresh.classList.add('loading');
    try {
      const { data, error } = await sb
        .from('bookings')
        .select('*')
        .order('booking_date', { ascending: true })
        .order('booking_time', { ascending: true });
      if (error) throw error;
      allBookings = data || [];
      updateStats();
      renderBookings();
    } catch(e) {
      document.getElementById('booking-container').innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <div class="msg">โหลดข้อมูลไม่สำเร็จ</div>
          <div class="sub">${e.message}</div>
        </div>`;
    } finally {
      refresh.classList.remove('loading');
    }
  }

  // ───── STATS ─────
  function updateStats() {
    const today = todayStr();
    const weekStart = new Date();
    weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    const weekStartStr = weekStart.toISOString().split('T')[0];

    const active = allBookings.filter(b => b.status === 'confirmed');
    const completed = allBookings.filter(b => b.status === 'completed');
    document.getElementById('stat-today').textContent = active.filter(b => b.booking_date === today).length;
    document.getElementById('stat-week').textContent = active.filter(b => b.booking_date >= weekStartStr).length;
    document.getElementById('stat-completed').textContent = completed.length;
  }

  // ───── HELPERS ─────
  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }
  function formatDateLong(dateStr) {
    const [y, m, d] = dateStr.split('-');
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const days = ['อา','จ','อ','พ','พฤ','ศ','ส'];
    const dt = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
    const isToday = dateStr === todayStr();
    const prefix = isToday ? 'วันนี้ · ' : `${days[dt.getDay()]}. `;
    return prefix + parseInt(d) + ' ' + months[parseInt(m) - 1] + ' ' + (parseInt(y) + 543);
  }
  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"
    })[c]);
  }
  function generateRefId() {
    return 'NN' + Date.now().toString(36).toUpperCase().slice(-6);
  }

  // ───── SEARCH ─────
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  searchInput.addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    searchClear.classList.toggle('show', searchTerm.length > 0);
    renderBookings();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchTerm = '';
    searchClear.classList.remove('show');
    renderBookings();
  });

  // ───── FILTER + SEARCH ─────
  function getFilteredBookings() {
    const today = todayStr();
    let list = [];

    switch(currentFilter) {
      case 'upcoming':
        list = allBookings.filter(b => b.status === 'confirmed' && b.booking_date >= today);
        break;
      case 'today':
        list = allBookings.filter(b => (b.status === 'confirmed' || b.status === 'completed') && b.booking_date === today);
        break;
      case 'completed':
        list = allBookings.filter(b => b.status === 'completed');
        break;
      case 'cancelled':
        list = allBookings.filter(b => b.status === 'cancelled');
        break;
      case 'all':
      default:
        list = allBookings.slice();
    }

    if (searchTerm) {
      list = list.filter(b => {
        const haystack = [
          b.customer_name, b.customer_phone, b.customer_line, b.ref_id
        ].map(s => String(s || '').toLowerCase()).join(' ');
        return haystack.includes(searchTerm);
      });
    }
    return list;
  }

  function groupByDate(bookings) {
    const groups = {};
    bookings.forEach(b => {
      if (!groups[b.booking_date]) groups[b.booking_date] = [];
      groups[b.booking_date].push(b);
    });
    return groups;
  }

  let currentView = 'cards';
  let sortColumn = 'booking_date';
  let sortAsc = true;

  // ───── RENDER ─────
  function renderBookings() {
    const list = getFilteredBookings();
    const container = document.getElementById('booking-container');

    if (list.length === 0) {
      const msg = searchTerm
        ? { icon: '🔍', msg: 'ไม่พบผลลัพธ์', sub: `ลองค้นด้วยคำอื่น` }
        : currentFilter === 'today'
          ? { icon: '✨', msg: 'วันนี้ว่างทั้งวัน', sub: 'ไม่มีลูกค้านัดเข้ามา' }
          : { icon: '📋', msg: 'ยังไม่มีนัด', sub: 'รอลูกค้าเข้ามาจองนะ' };
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">${msg.icon}</div>
          <div class="msg">${msg.msg}</div>
          <div class="sub">${msg.sub}</div>
        </div>`;
      return;
    }

    if (currentView === 'table') {
      renderTable(list);
    } else {
      renderCards(list);
    }
  }

  function renderCards(list) {
    const container = document.getElementById('booking-container');
    const groups = groupByDate(list);
    const dates = Object.keys(groups).sort();
    let html = '';
    dates.forEach(date => {
      html += `
        <div class="section-header">
          <h2>${formatDateLong(date)}</h2>
          <span class="count">${groups[date].length} นัด</span>
        </div>
        <div class="booking-list">
      `;
      groups[date].forEach(b => { html += renderBookingCard(b); });
      html += `</div>`;
    });
    container.innerHTML = html;
  }

  function renderTable(list) {
    const container = document.getElementById('booking-container');
    const sorted = [...list].sort((a, b) => {
      let av = a[sortColumn] || '';
      let bv = b[sortColumn] || '';
      if (sortColumn === 'booking_date') {
        av = (a.booking_date || '') + ' ' + (a.booking_time || '');
        bv = (b.booking_date || '') + ' ' + (b.booking_time || '');
      }
      const cmp = String(av).localeCompare(String(bv), 'th');
      return sortAsc ? cmp : -cmp;
    });

    const statusLabel = { confirmed: 'ยืนยัน', completed: 'เสร็จ', cancelled: 'ยกเลิก' };
    const sortIcon = col => col === sortColumn ? (sortAsc ? '▲' : '▼') : '⇅';

    let rows = sorted.map(b => {
      const st = b.status || 'confirmed';
      return `
        <tr class="row-${st}">
          <td class="col-time">${formatDateShort(b.booking_date)}</td>
          <td class="col-time">${b.booking_time || '—'}</td>
          <td class="col-name" title="${escapeHtml(b.customer_name)}">${escapeHtml(b.customer_name || '—')}</td>
          <td>${b.customer_phone ? `<a href="tel:${b.customer_phone}" style="color:var(--accent);text-decoration:none;">${escapeHtml(b.customer_phone)}</a>` : '—'}</td>
          <td>${escapeHtml(b.customer_line) || '—'}</td>
          <td class="col-ref">#${b.ref_id || '—'}</td>
          <td><span class="mini-tag ${st}">${statusLabel[st]}</span></td>
          <td class="col-actions">
            <button class="table-action" onclick="openEditModal('${b.id}')" title="แก้ไข">✏️</button>
            ${st === 'confirmed' ? `<button class="table-action" onclick="markStatus('${b.id}', 'completed')" title="มาร์คเสร็จ">✓</button>` : ''}
            ${st !== 'cancelled' ? `<button class="table-action" onclick="cancelBooking('${b.id}', '${escapeHtml(b.customer_name)}')" title="ยกเลิก">✕</button>` : `<button class="table-action" onclick="restoreBooking('${b.id}')" title="กู้คืน">↺</button>`}
            <button class="table-action del" onclick="deleteBooking('${b.id}', '${escapeHtml(b.customer_name)}')" title="ลบถาวร">🗑</button>
          </td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <div class="table-wrap">
        <table class="booking-table">
          <thead>
            <tr>
              <th class="${sortColumn === 'booking_date' ? 'sorted' : ''}" onclick="sortBy('booking_date')">วันที่ <span class="sort-icon">${sortIcon('booking_date')}</span></th>
              <th class="${sortColumn === 'booking_time' ? 'sorted' : ''}" onclick="sortBy('booking_time')">เวลา <span class="sort-icon">${sortIcon('booking_time')}</span></th>
              <th class="${sortColumn === 'customer_name' ? 'sorted' : ''}" onclick="sortBy('customer_name')">ชื่อ <span class="sort-icon">${sortIcon('customer_name')}</span></th>
              <th>โทร</th>
              <th>LINE</th>
              <th>REF</th>
              <th class="${sortColumn === 'status' ? 'sorted' : ''}" onclick="sortBy('status')">สถานะ <span class="sort-icon">${sortIcon('status')}</span></th>
              <th>จัดการ</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function formatDateShort(dateStr) {
    if (!dateStr) return '—';
    const [y, m, d] = dateStr.split('-');
    return `${parseInt(d)}/${parseInt(m)}/${(parseInt(y) + 543).toString().slice(-2)}`;
  }

  function sortBy(col) {
    if (sortColumn === col) sortAsc = !sortAsc;
    else { sortColumn = col; sortAsc = true; }
    renderBookings();
  }
  window.sortBy = sortBy;

  // ───── VIEW TOGGLE ─────
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      renderBookings();
    });
  });

  // ───── CSV EXPORT ─────
  function exportCSV() {
    const list = getFilteredBookings();
    if (list.length === 0) {
      toast('ไม่มีข้อมูลให้ export', 'error');
      return;
    }
    const statusLabel = { confirmed: 'ยืนยัน', completed: 'เสร็จแล้ว', cancelled: 'ยกเลิก' };
    const headers = ['วันที่', 'เวลา', 'ชื่อลูกค้า', 'เบอร์โทร', 'LINE ID', 'Ref', 'สถานะ', 'สร้างเมื่อ'];
    const rows = list.map(b => [
      b.booking_date || '',
      b.booking_time || '',
      b.customer_name || '',
      b.customer_phone || '',
      b.customer_line || '',
      b.ref_id || '',
      statusLabel[b.status] || b.status,
      b.created_at ? new Date(b.created_at).toLocaleString('th-TH') : ''
    ]);
    const csvContent = [headers, ...rows]
      .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
      .join('\n');
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `nailnery-bookings-${today}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`บันทึก CSV แล้ว (${list.length} รายการ)`, 'success');
  }
  document.getElementById('export-btn').addEventListener('click', exportCSV);

  function renderBookingCard(b) {
    const status = b.status || 'confirmed';
    const phone = b.customer_phone || '';
    const lineId = b.customer_line || '';
    const statusLabel = { confirmed: 'ยืนยันแล้ว', completed: 'เสร็จแล้ว', cancelled: 'ยกเลิก' }[status];

    let actionsHtml = '';

    if (status === 'cancelled') {
      actionsHtml = `
        <div class="booking-actions">
          <button class="btn-action btn-undo" onclick="restoreBooking('${b.id}')">↺ กู้คืน</button>
          <button class="btn-action btn-delete" onclick="deleteBooking('${b.id}', '${escapeHtml(b.customer_name)}')">🗑 ลบถาวร</button>
        </div>`;
    } else if (status === 'completed') {
      actionsHtml = `
        <div class="booking-actions">
          <button class="btn-action btn-edit" onclick="openEditModal('${b.id}')">✏️ แก้ไข</button>
          <button class="btn-action btn-undo" onclick="markStatus('${b.id}', 'confirmed')">↺ ย้อนกลับ</button>
          <button class="btn-action btn-delete btn-full" onclick="deleteBooking('${b.id}', '${escapeHtml(b.customer_name)}')">🗑 ลบถาวร</button>
        </div>`;
    } else {
      // confirmed
      actionsHtml = `
        <div class="booking-actions">
          ${phone ? `<a href="tel:${phone}" class="btn-action btn-call">📞 โทร</a>` : `<button class="btn-action btn-call" disabled>—</button>`}
          ${lineId ? `<button class="btn-action btn-line" onclick="copyLine('${escapeHtml(lineId)}')">💬 Line</button>` : `<button class="btn-action btn-line" disabled>—</button>`}
          <button class="btn-action btn-edit" onclick="openEditModal('${b.id}')">✏️ แก้ไข</button>
          <button class="btn-action btn-complete" onclick="markStatus('${b.id}', 'completed')">✓ เสร็จแล้ว</button>
          <button class="btn-action btn-cancel btn-full" onclick="cancelBooking('${b.id}', '${escapeHtml(b.customer_name)}')">✕ ยกเลิกนัดนี้</button>
        </div>`;
    }

    return `
      <div class="booking-card ${status}">
        <span class="status-tag ${status}">${statusLabel}</span>
        <span class="booking-ref">#${b.ref_id || '—'}</span>
        <div class="booking-row">
          <div class="booking-time">
            <div class="hr">${b.booking_time}</div>
            <div class="lbl">น.</div>
          </div>
          <div class="booking-info">
            <div class="booking-name">${escapeHtml(b.customer_name || 'ไม่ระบุชื่อ')}</div>
            <div class="booking-meta">
              <div class="row">
                <span class="label">โทร</span>
                <span class="value">${phone ? `<a href="tel:${phone}">${escapeHtml(phone)}</a>` : '—'}</span>
              </div>
              <div class="row">
                <span class="label">LINE</span>
                <span class="value">${escapeHtml(lineId) || '—'}</span>
              </div>
            </div>
          </div>
        </div>
        ${actionsHtml}
      </div>
    `;
  }

  // ───── ACTIONS ─────
  async function markStatus(id, newStatus) {
    try {
      const { error } = await sb.from('bookings').update({ status: newStatus }).eq('id', id);
      if (error) throw error;
      toast(newStatus === 'completed' ? 'มาร์คเสร็จแล้ว ✓' : 'ย้อนสถานะแล้ว', 'success');
      await loadBookings();
    } catch(e) { toast('ไม่สำเร็จ: ' + e.message, 'error'); }
  }

  async function cancelBooking(id, name) {
    if (!confirm(`ยืนยันยกเลิกนัดของ ${name}?\n\n(นัดจะถูกย้ายไปแท็บ "ยกเลิก" แต่ยังลบถาวรได้ภายหลัง)`)) return;
    try {
      const { error } = await sb.from('bookings').update({ status: 'cancelled' }).eq('id', id);
      if (error) throw error;
      toast('ยกเลิกนัดแล้ว', 'success');
      await loadBookings();
    } catch(e) { toast('ไม่สำเร็จ: ' + e.message, 'error'); }
  }

  async function restoreBooking(id) {
    try {
      const { error } = await sb.from('bookings').update({ status: 'confirmed' }).eq('id', id);
      if (error) throw error;
      toast('กู้คืนนัดแล้ว', 'success');
      await loadBookings();
    } catch(e) { toast('ไม่สำเร็จ: ' + e.message, 'error'); }
  }

  async function deleteBooking(id, name) {
    if (!confirm(`⚠️ ลบนัดของ "${name}" ออกจากระบบถาวร?\n\nการลบนี้ไม่สามารถย้อนกลับได้!`)) return;
    try {
      const { error } = await sb.from('bookings').delete().eq('id', id);
      if (error) throw error;
      toast('ลบเรียบร้อย', 'success');
      await loadBookings();
    } catch(e) { toast('ไม่สำเร็จ: ' + e.message, 'error'); }
  }

  function copyLine(lineId) {
    navigator.clipboard.writeText(lineId).then(() => {
      toast('คัดลอก Line ID แล้ว', 'success');
    }).catch(() => {
      toast('คัดลอกไม่สำเร็จ', 'error');
    });
  }

  // ───── EDIT MODAL ─────
  const modal = document.getElementById('edit-modal');

  function openEditModal(id) {
    editingId = id;
    const b = allBookings.find(x => x.id === id);
    if (!b) return;
    document.getElementById('modal-title').innerHTML = 'แก้ไข<em>นัด</em>';
    document.getElementById('modal-sub').textContent = 'เปลี่ยนข้อมูลการจองได้ตามต้องการ';
    document.getElementById('edit-name').value = b.customer_name || '';
    document.getElementById('edit-phone').value = b.customer_phone || '';
    document.getElementById('edit-line').value = b.customer_line || '';
    document.getElementById('edit-date').value = b.booking_date || todayStr();
    document.getElementById('edit-time').value = b.booking_time || '13:00';
    modal.classList.add('show');
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').innerHTML = 'เพิ่ม<em>นัดใหม่</em>';
    document.getElementById('modal-sub').textContent = 'สำหรับลูกค้า Walk-in หรือจองทาง LINE';
    document.getElementById('edit-name').value = '';
    document.getElementById('edit-phone').value = '';
    document.getElementById('edit-line').value = '';
    document.getElementById('edit-date').value = todayStr();
    document.getElementById('edit-time').value = '13:00';
    modal.classList.add('show');
  }

  function closeModal() {
    modal.classList.remove('show');
    editingId = null;
  }

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
  });

  document.getElementById('add-btn').addEventListener('click', openAddModal);

  document.getElementById('modal-save').addEventListener('click', async () => {
    const name = document.getElementById('edit-name').value.trim();
    const phone = document.getElementById('edit-phone').value.trim();
    const line = document.getElementById('edit-line').value.trim();
    const date = document.getElementById('edit-date').value;
    const time = document.getElementById('edit-time').value;

    if (!name || !date || !time) {
      toast('กรุณากรอกชื่อ วัน เวลา', 'error');
      return;
    }

    const payload = {
      customer_name: name,
      customer_phone: phone,
      customer_line: line,
      booking_date: date,
      booking_time: time
    };

    try {
      if (editingId) {
        // UPDATE
        const { error } = await sb.from('bookings').update(payload).eq('id', editingId);
        if (error) throw error;
        toast('บันทึกข้อมูลแล้ว', 'success');
      } else {
        // INSERT (walk-in)
        payload.status = 'confirmed';
        payload.ref_id = generateRefId();
        const { error } = await sb.from('bookings').insert([payload]);
        if (error) throw error;
        toast('เพิ่มนัดใหม่แล้ว', 'success');
      }
      closeModal();
      await loadBookings();
    } catch(e) {
      toast('ไม่สำเร็จ: ' + e.message, 'error');
    }
  });

  // Expose functions to global for inline onclick
  window.markStatus = markStatus;
  window.cancelBooking = cancelBooking;
  window.restoreBooking = restoreBooking;
  window.deleteBooking = deleteBooking;
  window.copyLine = copyLine;
  window.openEditModal = openEditModal;

  // ───── FILTERS ─────
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderBookings();
    });
  });

  // ───── REFRESH ─────
  document.getElementById('refresh-btn').addEventListener('click', loadBookings);

  // ───── INIT ─────
  if (isLoggedIn()) showDashboard();

  // Auto-refresh every 60s
  setInterval(() => {
    if (isLoggedIn() && !modal.classList.contains('show')) loadBookings();
  }, 60000);
</script>
</body>
</html>
